<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Wireframe - Sistem Pakar Buah Naga</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Segoe UI',sans-serif;padding:30px;display:flex;flex-direction:column;align-items:center;gap:50px}
h1{font-size:20px;color:#111}
h2{font-size:15px;text-align:center;margin-bottom:8px;color:#333}
.wrap{page-break-after:always}
</style>
</head>
<body>
<h1>Wireframe — Sistem Pakar Diagnosa Hama dan Penyakit Buah Naga</h1>
<div id="out"></div>
<script>
const W=800,SB='#888',ST='#111',LG='#ccc';

function mkSVG(w,h){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox',`0 0 ${w} ${h}`);s.setAttribute('width',w);
  s.style.maxWidth='100%';s.style.border='1.5px solid #999';
  return s;
}
function el(t,a,p){const e=document.createElementNS('http://www.w3.org/2000/svg',t);for(let k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
function txt(s,x,y,t,sz=12,anchor='middle',fw='normal',fill='#333'){
  t.split('\n').forEach((l,i)=>{
    el('text',{x,y:y+i*16,'text-anchor':anchor,'font-family':'Segoe UI','font-size':sz,'font-weight':fw,fill,'dominant-baseline':'central'},s).textContent=l;
  });
}
function rect(s,x,y,w,h,opts={}){
  el('rect',{x,y,width:w,height:h,rx:opts.rx||4,fill:opts.fill||'none',stroke:opts.stroke||SB,'stroke-width':opts.sw||1,...(opts.dash?{'stroke-dasharray':'4,3'}:{})},s);
}
function placeholder(s,x,y,w,h,label){
  rect(s,x,y,w,h,{fill:'#f0f0f0'});
  el('line',{x1:x,y1:y,x2:x+w,y2:y+h,stroke:LG,'stroke-width':1},s);
  el('line',{x1:x+w,y1:y,x2:x,y2:y+h,stroke:LG,'stroke-width':1},s);
  if(label)txt(s,x+w/2,y+h/2,label,10);
}
function btn(s,x,y,w,h,label,dark){
  rect(s,x,y,w,h,{fill:dark?'#333':'none',rx:6,stroke:'#333'});
  txt(s,x+w/2,y+h/2,label,11,'middle',dark?'600':'normal',dark?'#fff':'#333');
}
function input(s,x,y,w,h,label){
  rect(s,x,y,w,h,{stroke:'#aaa'});
  txt(s,x+8,y+h/2,label,10,'start','normal','#999');
}
function navbar(s,w,logo,items){
  rect(s,0,0,w,50,{fill:'#fafafa',stroke:'#ddd'});
  txt(s,20,25,logo,14,'start','700','#111');
  items.forEach((it,i)=>btn(s,w-60-(items.length-1-i)*80,12,70,26,it,i===items.length-1));
}
function sidebar(s,h,items,active){
  rect(s,0,0,180,h,{fill:'#f5f5f5',stroke:'#ddd'});
  txt(s,90,25,'Menu',13,'middle','700','#333');
  el('line',{x1:0,y1:45,x2:180,y2:45,stroke:'#ddd'},s);
  items.forEach((it,i)=>{
    const y=55+i*36;
    if(i===active)rect(s,8,y-2,164,30,{fill:'#e8e8e8',rx:6,stroke:'none'});
    txt(s,24,y+12,it,11,'start','normal',i===active?'#111':'#666');
  });
}
function table(s,x,y,w,cols,rows){
  const cw=w/cols.length,rh=30;
  rect(s,x,y,w,rh,{fill:'#eee',stroke:'#bbb'});
  cols.forEach((c,i)=>txt(s,x+i*cw+cw/2,y+rh/2,c,10,'middle','600','#333'));
  rows.forEach((r,ri)=>{
    const ry=y+rh+(ri*rh);
    rect(s,x,ry,w,rh,{stroke:'#ddd'});
    r.forEach((c,ci)=>txt(s,x+ci*cw+cw/2,ry+rh/2,c,9));
  });
  return y+rh+rows.length*rh;
}
function card(s,x,y,w,h,title){
  rect(s,x,y,w,h,{rx:8,stroke:'#ccc'});
  if(title){rect(s,x,y,w,30,{rx:8,fill:'#f5f5f5',stroke:'#ccc'});txt(s,x+12,y+15,title,11,'start','600');}
}

function addWireframe(title,drawFn){
  const wrap=document.createElement('div');wrap.className='wrap';
  const h2=document.createElement('h2');h2.textContent='Wireframe — '+title;wrap.appendChild(h2);
  const svg=drawFn();wrap.appendChild(svg);
  document.getElementById('out').appendChild(wrap);
}

// ===== 1. Landing Page =====
addWireframe('Landing Page (Halaman Awal)',()=>{
  const s=mkSVG(W,600);
  navbar(s,W,'Sistem Pakar Buah Naga',['Masuk','Daftar']);
  // Hero
  txt(s,200,110,'Diagnosa Penyakit',24,'middle','700','#111');
  txt(s,200,140,'Buah Naga',20,'middle','700','#d63384');
  txt(s,200,175,'Sistem pakar berbasis web dengan metode\nForward Chaining dan Certainty Factor',11,'middle');
  btn(s,120,210,160,36,'Mulai Diagnosa',true);
  // Hero image
  placeholder(s,440,70,320,200,'[Gambar Buah Naga]');
  // Stats bar
  rect(s,0,300,W,50,{fill:'#eee'});
  ['8 Penyakit','20 Gejala','24 Rules','FC+CF'].forEach((t,i)=>txt(s,100+i*180,325,t,12,'middle','600'));
  // Features
  txt(s,W/2,380,'Fitur Unggulan',16,'middle','700');
  for(let i=0;i<3;i++){card(s,30+i*250,405,230,80);placeholder(s,40+i*250,415,40,40,'Icon');txt(s,155+i*250,430,['Forward Chaining','Certainty Factor','Terpercaya'][i],11,'middle','600');}
  // CTA
  rect(s,0,510,W,90,{fill:'#f0f0f0'});
  txt(s,W/2,540,'Siap Mendiagnosa Tanaman Anda?',16,'middle','700');
  btn(s,300,560,200,30,'Daftar Gratis',true);
  return s;
});

// ===== 4. Dashboard Admin =====
addWireframe('Dashboard Admin',()=>{
  const s=mkSVG(W,500);
  sidebar(s,500,['Dashboard','Data Penyakit','Data Gejala','Data Rules','Data Users'],0);
  // Header
  txt(s,200,30,'Dashboard Admin',18,'start','700');
  // Stats
  const stats=['Penyakit: 8','Gejala: 20','Rules: 24','Users: 10','Diagnosa: 45'];
  stats.forEach((st,i)=>{card(s,195+i*118,55,110,55);txt(s,250+i*118,82,st,10);});
  // Cards
  card(s,195,130,290,160,'Forward Chaining');
  txt(s,340,175,'IF Gejala A AND Gejala B',9);
  txt(s,340,195,'THEN Penyakit X',9);
  card(s,500,130,290,160,'Certainty Factor');
  txt(s,645,175,'CF = CF(User) × CF(Pakar)',9);
  txt(s,645,195,'CF Kombinasi = CF1+CF2×(1-CF1)',9);
  // Recent
  card(s,195,310,595,180,'Diagnosa Terbaru');
  table(s,205,345,575,['Tanggal','Penyakit','CF','User'],[
    ['10/05/2026','Busuk Batang','85%','User A'],
    ['09/05/2026','Antraknosa','72%','User B'],
    ['08/05/2026','Layu Fusarium','68%','User C'],
  ]);
  return s;
});

// ===== CRUD Template =====
function drawCRUD(title,menuIdx,entity,cols,rows){
  addWireframe(title,()=>{
    const s=mkSVG(W,420);
    sidebar(s,420,['Dashboard','Data Penyakit','Data Gejala','Data Rules','Data Users'],menuIdx);
    txt(s,350,28,title,16,'start','700');
    btn(s,680,15,100,30,'+ Tambah',true);
    // Search
    input(s,200,55,300,30,'🔍 Cari '+entity+'...');
    // Table
    table(s,200,100,585,cols,rows);
    // Pagination
    txt(s,490,390,'« 1 2 3 »',10);
    return s;
  });
}
